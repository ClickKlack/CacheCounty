name: CI / Deploy

on:
  push:
    branches: [main]      # CI läuft automatisch bei jedem Push
  workflow_dispatch:       # Deploy kann manuell über GitHub ausgelöst werden

jobs:
  # ── 1. CI: PHP-Syntax prüfen ──────────────────────────────────
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Composer-Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Composer validieren
        run: composer validate --strict
        working-directory: api

      - name: Abhängigkeiten installieren
        run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: PHP-Syntax aller Dateien prüfen
        run: find api/src -name "*.php" | xargs -I{} php -l {}

  # ── 2. Tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Composer-Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Abhängigkeiten installieren (inkl. Dev)
        run: composer install --optimize-autoloader
        working-directory: api

      - name: PHPUnit ausführen
        run: vendor/bin/phpunit
        working-directory: api

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm-Abhängigkeiten installieren
        run: npm ci

      - name: Vitest ausführen
        run: npm test

  # ── 3. Deploy via rsync + SSH ─────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'workflow_dispatch'   # nur bei manuellem Start

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Composer-Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Composer (ohne Dev-Pakete)
        run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: SSH-Key einrichten
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_KEY:  ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Version-Datei erzeugen
        run: |
          echo "{\"commit\":\"$(git rev-parse --short HEAD)\",\"built\":\"$(date -u +%Y-%m-%dT%H:%MZ)\"}" > app/version.json

      - name: Dateien via rsync übertragen
        env:
          SSH_HOST:    ${{ secrets.SSH_HOST }}
          SSH_PORT:    ${{ secrets.SSH_PORT || '22' }}
          SSH_USER:    ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='api/config/*.local.php' \
            --exclude='api/config/database.local.php' \
            --exclude='data/*.geojson' \
            --exclude='*.bak.*' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
